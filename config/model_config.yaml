# Model Configuration
# This file contains configuration settings for different LLM providers and models.

# Default provider settings
default_provider: "openai"
default_model: "gpt-3.5-turbo"

# OpenAI Configuration
openai:
  api_key: "${OPENAI_API_KEY}"  # Set via environment variable
  organization: "${OPENAI_ORGANIZATION}"  # Optional: Set via environment variable
  models:
    gpt-4:
      max_tokens: 8192
      temperature: 0.7
      top_p: 1.0
      frequency_penalty: 0.0
      presence_penalty: 0.0
      context_window: 8192
      cost_per_1k_input_tokens: 0.03
      cost_per_1k_output_tokens: 0.06
    gpt-4-32k:
      max_tokens: 32768
      temperature: 0.7
      top_p: 1.0
      frequency_penalty: 0.0
      presence_penalty: 0.0
      context_window: 32768
      cost_per_1k_input_tokens: 0.06
      cost_per_1k_output_tokens: 0.12
    gpt-3.5-turbo:
      max_tokens: 4096
      temperature: 0.7
      top_p: 1.0
      frequency_penalty: 0.0
      presence_penalty: 0.0
      context_window: 4096
      cost_per_1k_input_tokens: 0.0015
      cost_per_1k_output_tokens: 0.002
    gpt-3.5-turbo-16k:
      max_tokens: 16384
      temperature: 0.7
      top_p: 1.0
      frequency_penalty: 0.0
      presence_penalty: 0.0
      context_window: 16384
      cost_per_1k_input_tokens: 0.003
      cost_per_1k_output_tokens: 0.004
    text-davinci-003:
      max_tokens: 4096
      temperature: 0.7
      top_p: 1.0
      frequency_penalty: 0.0
      presence_penalty: 0.0
      context_window: 4096
      cost_per_1k_tokens: 0.02

# Anthropic Configuration
anthropic:
  api_key: "${ANTHROPIC_API_KEY}"  # Set via environment variable
  models:
    claude-3-opus-20240229:
      max_tokens: 4096
      temperature: 0.7
      context_window: 200000
      cost_per_1k_input_tokens: 0.015
      cost_per_1k_output_tokens: 0.075
    claude-3-sonnet-20240229:
      max_tokens: 4096
      temperature: 0.7
      context_window: 200000
      cost_per_1k_input_tokens: 0.003
      cost_per_1k_output_tokens: 0.015
    claude-3-haiku-20240307:
      max_tokens: 4096
      temperature: 0.7
      context_window: 200000
      cost_per_1k_input_tokens: 0.00025
      cost_per_1k_output_tokens: 0.00125
    claude-2.1:
      max_tokens: 4096
      temperature: 0.7
      context_window: 100000
      cost_per_1k_input_tokens: 0.008
      cost_per_1k_output_tokens: 0.024
    claude-instant-1.2:
      max_tokens: 4096
      temperature: 0.7
      context_window: 100000
      cost_per_1k_input_tokens: 0.0008
      cost_per_1k_output_tokens: 0.0024

# Rate Limiting Configuration
rate_limits:
  openai:
    default:
      calls_per_minute: 60
      calls_per_hour: 3600
      calls_per_day: 86400
      burst_size: 10
    gpt-4:
      calls_per_minute: 20
      calls_per_hour: 1200
      calls_per_day: 28800
      burst_size: 5
    gpt-3.5-turbo:
      calls_per_minute: 60
      calls_per_hour: 3600
      calls_per_day: 86400
      burst_size: 10
  anthropic:
    default:
      calls_per_minute: 50
      calls_per_hour: 3000
      calls_per_day: 72000
      burst_size: 8
    claude-3-opus:
      calls_per_minute: 20
      calls_per_hour: 1200
      calls_per_day: 28800
      burst_size: 4
    claude-3-sonnet:
      calls_per_minute: 50
      calls_per_hour: 3000
      calls_per_day: 72000
      burst_size: 8
    claude-3-haiku:
      calls_per_minute: 100
      calls_per_hour: 6000
      calls_per_day: 144000
      burst_size: 15

# Retry Configuration
retry_config:
  max_retries: 3
  base_delay: 1.0
  max_delay: 60.0
  exponential_base: 2.0
  retry_on_errors:
    - "rate_limit"
    - "network_error"
    - "timeout"
    - "server_error"

# Token Management
token_limits:
  max_input_tokens: 100000  # Maximum input tokens per request
  max_output_tokens: 10000  # Maximum output tokens per request
  warning_threshold: 0.8    # Warn when approaching token limits

# Caching Configuration
cache_config:
  enabled: true
  backend: "memory"  # Options: memory, file, sqlite
  default_ttl: 3600  # 1 hour in seconds
  max_entries: 1000
  include_model_in_key: true
  include_params_in_key: true
  cache_dir: "data/cache"

# Logging Configuration Integration
logging_integration:
  log_requests: true
  log_responses: true
  log_tokens: true
  log_costs: true
  log_performance: true
  mask_sensitive_data: true

# Environment-specific configurations
environments:
  development:
    openai:
      rate_limits:
        calls_per_minute: 30
        calls_per_hour: 1800
    cache_config:
      default_ttl: 600  # 10 minutes for development
    logging_integration:
      log_requests: true
      log_responses: true
  
  production:
    openai:
      rate_limits:
        calls_per_minute: 100
        calls_per_hour: 6000
    cache_config:
      default_ttl: 7200  # 2 hours for production
      backend: "sqlite"
    logging_integration:
      log_requests: true
      log_responses: false  # Don't log full responses in production
      mask_sensitive_data: true
  
  testing:
    cache_config:
      enabled: false  # Disable caching for tests
    retry_config:
      max_retries: 1  # Faster failure for tests
    logging_integration:
      log_requests: false
      log_responses: false

# Security Settings
security:
  mask_api_keys_in_logs: true
  max_prompt_length: 500000  # Maximum prompt length (characters)
  allowed_file_types: ["txt", "json", "yaml", "yml", "md"]
  sanitize_inputs: true
  validate_outputs: true

# Performance Settings
performance:
  enable_concurrent_requests: false  # Set to true for batch processing
  max_concurrent_requests: 5
  request_timeout: 120  # seconds
  connection_timeout: 30  # seconds
  enable_compression: true

# Monitoring and Analytics
monitoring:
  enable_usage_tracking: true
  track_token_usage: true
  track_costs: true
  track_performance_metrics: true
  generate_daily_reports: false
  alert_on_high_usage: true
  usage_alert_threshold: 1000  # requests per hour
  cost_alert_threshold: 100.0  # USD per day